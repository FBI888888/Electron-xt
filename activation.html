<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软件激活</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .activation-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            padding: 50px 40px;
            text-align: center;
        }
        
        .logo {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            color: #555;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Consolas', 'Monaco', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-group input::placeholder {
            text-transform: none;
            letter-spacing: 0;
            color: #bbb;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .message {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .message.error {
            background: #fee2e2;
            color: #dc2626;
            display: block;
        }
        
        .message.success {
            background: #d1fae5;
            color: #059669;
            display: block;
        }
        
        .status-info {
            background: #f0fdf4;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
            display: none;
        }
        
        .status-info.show {
            display: block;
        }
        
        .status-info h3 {
            color: #059669;
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
        }
        
        .status-item:last-child {
            border-bottom: none;
        }
        
        .status-item .label {
            color: #666;
        }
        
        .status-item .value {
            color: #333;
            font-weight: 600;
        }
        
        .status-item .value.vip {
            color: #f59e0b;
        }
        
        .status-item .value.vvip {
            color: #7c3aed;
        }
        
        .status-item .value.svip {
            color: #db2777;
        }
        
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="activation-container">
        <div class="logo">🔐</div>
        <h1>星图达人采集管理系统</h1>
        <p class="version" style="color: #888; font-size: 12px; margin: -5px 0 10px;">V1.3.0</p>
        <p class="subtitle">请输入激活码以解锁软件功能</p>
        
        
        <!-- 状态信息 (已激活时显示) -->
        <div class="status-info" id="statusInfo">
            <h3>✅ 软件已激活</h3>
            <div class="status-item">
                <span class="label">激活码</span>
                <span class="value" id="infoKey">-</span>
            </div>
            <div class="status-item">
                <span class="label">会员等级</span>
                <span class="value" id="infoLevel">-</span>
            </div>
            <div class="status-item">
                <span class="label">到期时间</span>
                <span class="value" id="infoExpire">-</span>
            </div>
            <div class="status-item">
                <span class="label">剩余天数</span>
                <span class="value" id="infoDays">-</span>
            </div>
        </div>
        
        <!-- 消息提示 -->
        <div class="message" id="message"></div>
        
        <!-- 激活表单 -->
        <div id="activationForm">
            <div class="form-group">
                <label>激活码</label>
                <input type="text" id="licenseKey" placeholder="请输入激活码 (如: XXXX-XXXX-XXXX-XXXX)" maxlength="20">
            </div>
            
            <button class="btn btn-primary" id="activateBtn" onclick="doActivate()">
                立即激活
            </button>
        </div>
        
        <!-- 已激活时的按钮 -->
        <div id="activatedActions" style="display: none;">
            <button class="btn btn-primary" onclick="enterApp()">
                进入软件
            </button>
        </div>
        
        <div class="footer">
            如需购买激活码，请联系客服
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        
        let currentLicenseInfo = null;
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', async () => {
            // 检查激活状态
            checkActivation();
            
            // 回车键激活
            document.getElementById('licenseKey').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    doActivate();
                }
            });
        });
        
        // 检查激活状态 (向服务器验证)
        async function checkActivation() {
            // 使用 verify-license 向服务器验证，而不是只检查本地缓存
            const result = await ipcRenderer.invoke('verify-license');
            
            if (result.success) {
                // 服务器验证通过，显示激活信息
                currentLicenseInfo = result.data;
                showActivatedStatus(result.data);
            } else {
                // 服务器验证失败 (可能被解绑/禁用)，显示激活表单
                showActivationForm();
                if (result.message && result.code !== 'NOT_ACTIVATED') {
                    showMessage(result.message, 'error');
                }
            }
        }
        
        // 显示激活表单
        function showActivationForm() {
            document.getElementById('statusInfo').classList.remove('show');
            document.getElementById('activationForm').style.display = 'block';
            document.getElementById('activatedActions').style.display = 'none';
        }
        
        // 显示已激活状态
        function showActivatedStatus(info) {
            document.getElementById('statusInfo').classList.add('show');
            document.getElementById('activationForm').style.display = 'none';
            document.getElementById('activatedActions').style.display = 'block';
            
            document.getElementById('infoKey').textContent = info.license_key;
            
            const levelEl = document.getElementById('infoLevel');
            levelEl.textContent = info.member_level;
            levelEl.className = 'value ' + info.member_level.toLowerCase();
            
            document.getElementById('infoExpire').textContent = 
                new Date(info.expire_at).toLocaleString('zh-CN');
            document.getElementById('infoDays').textContent = info.days_remaining + ' 天';
        }
        
        // 激活
        async function doActivate() {
            const licenseKey = document.getElementById('licenseKey').value.trim();
            
            if (!licenseKey) {
                showMessage('请输入激活码', 'error');
                return;
            }
            
            const btn = document.getElementById('activateBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>激活中...';
            
            try {
                const result = await ipcRenderer.invoke('activate-license', licenseKey);
                
                if (result.success) {
                    showMessage('激活成功！', 'success');
                    setTimeout(() => {
                        checkActivation();
                    }, 1000);
                } else if (result.code === 'ALREADY_ACTIVATED') {
                    // 授权码已被其他设备使用，询问是否解绑
                    btn.disabled = false;
                    btn.innerHTML = '立即激活';
                    showConfirmUnbind(licenseKey);
                } else {
                    showMessage(result.message || '激活失败', 'error');
                }
            } catch (e) {
                showMessage('激活请求失败: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '立即激活';
            }
        }
        
        // 显示解绑确认对话框
        async function showConfirmUnbind(licenseKey) {
            const confirmed = await ipcRenderer.invoke('show-confirm-dialog', {
                title: '授权码已被使用',
                message: '该授权码已绑定到其他设备。\n\n继续激活将解绑原设备，并绑定到当前设备。\n\n确定要继续吗？',
                buttons: ['取消', '确定解绑并激活']
            });
            
            if (confirmed) {
                // 用户确认，强制激活（解绑原设备）
                const btn = document.getElementById('activateBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="loading"></span>解绑中...';
                
                try {
                    const result = await ipcRenderer.invoke('activate-license', licenseKey, true); // force=true
                    
                    if (result.success) {
                        showMessage('激活成功！原设备已解绑', 'success');
                        setTimeout(() => {
                            checkActivation();
                        }, 1000);
                    } else {
                        showMessage(result.message || '激活失败', 'error');
                    }
                } catch (e) {
                    showMessage('激活请求失败: ' + e.message, 'error');
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = '立即激活';
                }
            }
        }
        
        // 进入应用
        function enterApp() {
            ipcRenderer.invoke('enter-main-app');
        }
        
        // 显示消息
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }
        
        // 隐藏消息
        function hideMessage() {
            document.getElementById('message').className = 'message';
        }
    </script>
</body>
</html>
